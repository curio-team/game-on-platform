<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Raad het Getal</title>
  <link rel="preconnect"
        href="https://fonts.googleapis.com">
  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap"
        rel="stylesheet">
  <script type="module" crossorigin src="/game-on-platform/assets/guessTheNumber-DeTVF6V5.js"></script>
  <link rel="modulepreload" crossorigin href="/game-on-platform/assets/platform-BPYQ5op4.js">
  <link rel="modulepreload" crossorigin href="/game-on-platform/assets/main-r7IOKlDE.js">
  <link rel="stylesheet" crossorigin href="/game-on-platform/assets/main-BAxy-PvM.css">
</head>

<body>
  <header>
    <div class="logo">
      <a href="../../"
         class="back-link">&#9664;</a>
      <span>GUESS</span>THE NUMBER
    </div>
    <div class="tagline">STEL DE REGELS IN. SPEEL JE SPEL.</div>
    <button class="run-btn"
            id="runBtn">&#9654; START SPEL</button>
  </header>

  <div class="main">
    <!-- GAME PANEL -->
    <div class="game-panel">
      <div class="panel-label">&#9672; SPELSCHERM &#9672;</div>
      <canvas id="gameCanvas"
              width="360"
              height="420"></canvas>
      <div class="game-info">
        <div class="stat-box">
          <div class="stat-label">POGINGEN</div>
          <div class="stat-val"
               id="attemptsDisplay">-</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">BEREIK</div>
          <div class="stat-val"
               id="rangeDisplay">-</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">BESTE</div>
          <div class="stat-val"
               id="bestDisplay">-</div>
        </div>
      </div>
      <div class="hint"
           id="hintText">&#9654; DRUK OP START SPEL OM TE BEGINNEN</div>
    </div>

    <!-- CODE PANEL -->
    <div class="code-panel">
      <div class="code-tabs">
        <button class="tab active"
                id="tabBlocks">&#129513; BLOKKEN</button>
        <button class="tab"
                id="tabCode">{ } GEGENEREERDE CODE</button>
      </div>
      <div id="blocklyDiv"></div>
      <div id="generatedCode"
           class="generated-code-panel">
        <pre id="codeOutput"></pre>
      </div>
    </div>
  </div>

</body>

</html>
