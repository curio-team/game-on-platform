<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>marIO++ - Programmeer de 'game loop'</title>
  <link rel="preconnect"
        href="https://fonts.googleapis.com">
  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap"
        rel="stylesheet">
</head>

<body>
  <header>
    <div class="logo">
      <a href="../../"
         class="back-link">&#9664;</a>
      <span class="pixel-bird-icon"></span>mar<span>IO++</span>
    </div>
    <div class="tagline">SCHRIJF DE 'GAME LOOP'. SPEEL JE CREATIE.</div>
    <button class="run-btn"
            id="runBtn">&#9654; START SPEL</button>
  </header>

  <div class="main">
    <!-- GAME PANEL -->
    <div class="game-panel">
      <div class="panel-label">&#9672; SPELSCHERM &#9672;</div>
      <canvas id="gameCanvas"
              width="360"
              height="420"></canvas>
      <div class="game-info">
        <div class="stat-box">
          <div class="stat-label">SCORE</div>
          <div class="stat-val"
               id="scoreDisplay">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">BESTE</div>
          <div class="stat-val"
               id="bestDisplay">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">LEVENS</div>
          <div class="stat-val"
               id="livesDisplay">3</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">MUNTEN</div>
          <div class="stat-val"
               id="coinsDisplay">0</div>
        </div>
      </div>
      <div class="hint"
           id="hintText">&#9654; DRUK OP START SPEL OM TE BEGINNEN</div>
    </div>

    <!-- CODE PANEL -->
    <div class="code-panel">
      <div class="code-tabs">
        <button class="tab active"
                id="tabBlocks">&#129513; BLOKKEN</button>
        <button class="tab"
                id="tabCode">{ } GEGENEREERDE CODE</button>
        <button class="tab"
                id="tabLevel">&#128507; LEVEL EDITOR</button>
      </div>
      <div id="blocklyDiv"></div>
      <div id="generatedCode"
           class="generated-code-panel">
        <pre id="codeOutput"></pre>
      </div>
      <div id="levelEditorPanel"
           class="level-editor-panel">
        <div class="editor-toolbar">
          <div class="editor-tool-group">
            <button class="tool-btn active"
                    data-tool="brick">&#129521; BRICK</button>
            <button class="tool-btn"
                    data-tool="question">&#10067; ?BLOK</button>
            <button class="tool-btn"
                    data-tool="gap">&#11035; GAT</button>
            <button class="tool-btn"
                    data-tool="pipe">&#127807; PIJP</button>
            <button class="tool-btn"
                    data-tool="coin">&#129689; MUNT</button>
            <button class="tool-btn"
                    data-tool="goomba">&#128126; GOOMBA</button>
            <button class="tool-btn"
                    data-tool="koopa">&#128034; KOOPA</button>
            <button class="tool-btn"
                    data-tool="eraser">&#10005; WIS</button>
          </div>
          <div class="editor-options-group">
            <label class="editor-label">SCHERMEN:
              <input type="range"
                     id="levelScreens"
                     min="2"
                     max="10"
                     value="4">
              <span id="screensVal">4</span>
            </label>
            <button class="editor-reset-btn"
                    id="resetLevel">&#8635; RESET</button>
          </div>
        </div>
        <div class="editor-scroll">
          <canvas id="levelEditorCanvas"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script type="module"
          src="./main.js"></script>
</body>

</html>
